<!DOCTYPE html>
<html>
<head><title>Test WS</title></head>
<body>
<h2>Tester communes</h2>
<button onclick="fetchData()">Lancer</button>
<pre id="result"></pre>

<script>
function fetchData() {
  fetch("http://127.0.0.1:8000/communes", {
    headers: { "token": "123abc" }
  })
  .then(res => res.json())
  .then(data => document.getElementById("result").innerText = JSON.stringify(data, null, 2));
}
</script>
</body>
</html>
